name: Daily AI Sentence Update

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at 00:00 UTC
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Ollama Models
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-tinyllama
          restore-keys: |
            ${{ runner.os }}-ollama-tinyllama

      - name: Debug Cache Status
        run: |
          echo "🔍 Cache hit: ${{ steps.cache-ollama.outputs.cache-hit }}"
          if [ -d ~/.ollama/models ]; then
            echo "📦 Models directory exists:"
            ls -lh ~/.ollama/models/ 2>/dev/null || echo "   (empty or inaccessible)"
          else
            echo "⚠️  ~/.ollama/models does not exist yet"
          fi

      - name: Install Ollama
        run: |
          if ! command -v ollama &> /dev/null; then
            echo "⬇️  Installing Ollama..."
            curl -fsSL https://ollama.com/install.sh | sh
          else
            echo "✅ Ollama already installed"
          fi

      - name: Generate Sentence
        id: ai
        run: |
          # Start Ollama in background
          echo "🚀 Starting Ollama server..."
          ollama serve & 
          OLLAMA_PID=$!
          
          # Wait for Ollama to be ready (health check)
          echo "⏳ Waiting for Ollama API..."
          max_attempts=30
          attempt=0
          until curl -s localhost:11434/api/tags > /dev/null 2>&1; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "❌ Ollama failed to start in time"
              exit 1
            fi
            sleep 2
          done
          echo "✅ Ollama is ready"
          
          # Only pull model if not already present
          if ollama list 2>/dev/null | grep -q "tinyllama"; then
            echo "✅ Model 'tinyllama' already cached locally"
          else
            echo "⬇️  Pulling 'tinyllama' model (first run or cache miss)..."
            ollama pull tinyllama
          fi
          
          # Generate sentence
          echo "🤖 Generating sentence..."
          RAW_SENTENCE=$(ollama run tinyllama "Generate one short, creative random sentence. Output ONLY the sentence, no explanations or quotes.")
          
          # Clean: remove ANSI codes, quotes, carriage returns, and trim whitespace
          CLEAN_SENTENCE=$(printf '%s' "$RAW_SENTENCE" \
            | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' \  # Remove ANSI escape sequences
            | tr -d '\r' \                          # Remove carriage returns
            | sed 's/^"//;s/"$//' \                 # Remove leading/trailing double quotes
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')  # Trim leading/trailing whitespace
          
          # Validate output
          if [ -z "$CLEAN_SENTENCE" ]; then
            echo "❌ Generated sentence is empty. Raw output:"
            echo "$RAW_SENTENCE"
            exit 1
          fi
          
          echo "✨ Cleaned sentence: $CLEAN_SENTENCE"
          
          # Save to output for next steps (properly escaped)
          echo "sentence=${CLEAN_SENTENCE}" >> $GITHUB_OUTPUT
          
          # Cleanup: stop Ollama server gracefully
          kill $OLLAMA_PID 2>/dev/null || true

      - name: Commit and Push Changes
        run: |
          SENTENCE="${{ steps.ai.outputs.sentence }}"
          
          # Safety check
          if [ -z "$SENTENCE" ]; then
            echo "❌ No sentence to commit"
            exit 1
          fi
          
          # Append to log file
          echo "$SENTENCE" >> daily_log.txt
          
          # Git identity
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "${{ github.repository_owner }}@users.noreply.github.com"
          
          # Stage, commit, push
          git add daily_log.txt
          git commit -m "$SENTENCE"
          git push
          
          echo "✅ Successfully committed and pushed: $SENTENCE"
