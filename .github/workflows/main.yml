name: Daily AI Sentence Update

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at 00:00 UTC
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Ollama & Models
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-tinyllama

      - name: Install Ollama
        run: |
          if ! command -v ollama &> /dev/null; then
            curl -fsSL https://ollama.com/install.sh | sh
          fi

      - name: Generate Sentence
        id: ai
        run: |
          # Start Ollama in background
          ollama serve & 
          
          # Wait for Ollama to be ready (health check)
          until curl -s localhost:11434/api/tags > /dev/null; do sleep 2; done
          
          # Ensure model is present
          ollama pull tinyllama
          
          # Generate sentence and clean it (remove extra whitespace/quotes)
          RAW_SENTENCE=$(ollama run tinyllama "Generate one short, creative random sentence.")
          CLEAN_SENTENCE=$(echo "$RAW_SENTENCE" | tr -d '"' | xargs)
          
          # Save to output for next steps
          echo "sentence=$CLEAN_SENTENCE" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        run: |
          # Use the sentence generated by AI
          SENTENCE="${{ steps.ai.outputs.sentence }}"
          
          # Append to file
          echo "$SENTENCE" >> daily_log.txt
          
          # Git Identity
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "${{ github.repository_owner }}@users.noreply.github.com"
          
          # Stage, Commit, and Push
          git add daily_log.txt
          git commit -m "$SENTENCE"
          git push
