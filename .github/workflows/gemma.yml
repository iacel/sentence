name: Daily AI Sentence Update (Gemma 4 E2B)

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # OPTIONAL: Cache Ollama Models (may not work reliably across runs due to ephemeral runners)
      # - name: Cache Ollama Models
      #   id: cache-ollama
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.ollama
      #     key: ${{ runner.os }}-ollama-gemma4-e2b
      #     restore-keys: |
      #       ${{ runner.os }}-ollama-gemma4-e2b

      - name: Install Ollama
        run: |
          if ! command -v ollama &> /dev/null; then
            curl -fsSL https://ollama.com/install.sh | sh
          fi

      - name: Generate Sentence
        id: ai
        run: |
          # Start Ollama in background
          ollama serve &
          sleep 5
          
          # Wait for API readiness
          for i in {1..30}; do
            if curl -s localhost:11434/api/tags > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          
          # Pull model only if needed
          if ! ollama list 2>/dev/null | grep -q gemma4:e2b; then
            ollama pull gemma4:e2b
          fi
          
          # Generate sentence via Ollama API - ask model for single-line output
          RAW_SENTENCE=$(curl -s http://localhost:11434/api/generate \
            -d '{
              "model": "gemma4:e2b",
              "prompt": "Generate exactly one short, creative sentence. Output ONLY the sentence text, no line breaks, no quotes, no explanations.",
              "stream": false
            }' | jq -r '.response' 2>/dev/null)
          
          # Clean: remove ANSI codes, newlines, quotes, and collapse whitespace
          CLEAN_SENTENCE=$(printf '%s' "$RAW_SENTENCE" | tr -d '\r' | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/"/ /g; s/^[[:space:]]+|[[:space:]]+$//g; s/[[:space:]]+/ /g')

          # Validate
          if [ -z "$CLEAN_SENTENCE" ]; then
            echo "❌ Failed to generate valid sentence"
            exit 1
          fi
          
          echo "✨ Generated: $CLEAN_SENTENCE"
          
          # Write to GITHUB_OUTPUT using delimiter syntax (handles any special chars safely)
          {
            echo "sentence<<GITHUB_OUTPUT_DELIMITER"
            printf '%s\n' "$CLEAN_SENTENCE"
            echo "GITHUB_OUTPUT_DELIMITER"
          } >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        run: |
          SENTENCE="${{ steps.ai.outputs.sentence }}"
          
          if [ -z "$SENTENCE" ]; then
            echo "⚠️ No sentence generated, skipping commit"
            exit 0
          fi
          
          # Append to log file
          echo "$SENTENCE" >> daily_log_gemma.txt
          
          # Git identity
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "${{ github.repository_owner }}@users.noreply.github.com"
          
          # Commit and push
          git add daily_log_gemma.txt
          git commit -m "$SENTENCE"
          git push
          
          echo "✅ Successfully committed: $SENTENCE"
